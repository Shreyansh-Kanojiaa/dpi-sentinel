services:
  # Recording aid only, not part of the product: a controllable HTTP target
  # for the pitch video's "degraded" demo beat. Public status-code test
  # services (httpstat.us, httpbin.org) proved unreliable, so witnesses probe
  # this container instead. `docker compose stop demo-target` makes it
  # unreachable -> unhealthy per quorum's agreement check (see quorum.py);
  # `docker compose start demo-target` recovers it. No file edits needed to
  # trigger or resolve the incident.
  demo-target:
    image: nginx:alpine

  aggregator:
    build: ./backend
    environment:
      DB_URL: sqlite:////app/data/dpi_sentinel.db
      WITNESS_URLS: http://witness-a:8500,http://witness-b:8500,http://witness-c:8500
      MIN_PARTICIPATION_FRACTION: "0.66"
      AGREEMENT_SUPERMAJORITY_FRACTION: "0.6"
      WINDOW_SECONDS: "60"
      QUORUM_TICK_SECONDS: "5"
      OBSERVATION_FRESHNESS_SECONDS: "30"
      # Milestone 3: aggregator identity + tamper-evident log / checkpoints.
      AGGREGATOR_KEY_PATH: /app/keys/aggregator.key
      CHECKPOINT_REPO_PATH: /app/checkpoint-repo
      CHECKPOINT_TICK_SECONDS: "60"
      CHECKPOINT_MAX_ENTRIES: "50"
      CHECKPOINT_MAX_AGE_SECONDS: "3600"
      # Milestone 4: Evidence Certificate issuance rate limit (per IP).
      CERT_RATE_LIMIT_MAX: "5"
      CERT_RATE_LIMIT_WINDOW_SECONDS: "600"
    volumes:
      - aggregator-db:/app/data
      - aggregator-keys:/app/keys          # persist the aggregator's Ed25519 identity across restarts
      - aggregator-checkpoints:/app/checkpoint-repo  # git repo the signed Merkle roots are anchored into
    ports:
      - "8420:8420"

  # All three witnesses cover BOTH rails (UPI and DigiLocker) so quorum can
  # be demonstrated meaningfully with only 3 witnesses per rail: stopping
  # one still leaves 2/3 reporting on a given rail (participation holds),
  # stopping two drops it to 1/3 (participation fails -> insufficient_data).
  # Every witness probing every configured target is a deliberate, documented
  # simplification (see PROBE_TARGETS comment in witness/main.py) — the
  # aggregator's participation math divides by the TOTAL registered witness
  # count, not a per-rail-assigned count, so a rail covered by only a subset
  # of witnesses could never clear MIN_PARTICIPATION_FRACTION. Correct
  # behavior given that math, not a bug — but it means every witness needs
  # to cover every rail until per-rail witness assignment is built.
  witness-a:
    build: ./witness
    environment:
      WITNESS_ID: witness-a
      PROBE_TARGETS: "upi:http://demo-target/,digilocker:https://www.digilocker.gov.in"
      AGGREGATOR_URL: http://aggregator:8420
      PROBE_INTERVAL_SECONDS: "8"
      KEY_PATH: /keys/witness.key
    volumes:
      - witness-a-keys:/keys
    ports:
      - "8500:8500"
    depends_on:
      - aggregator
      - demo-target

  witness-b:
    build: ./witness
    environment:
      WITNESS_ID: witness-b
      PROBE_TARGETS: "upi:http://demo-target/,digilocker:https://www.digilocker.gov.in"
      AGGREGATOR_URL: http://aggregator:8420
      PROBE_INTERVAL_SECONDS: "8"
      KEY_PATH: /keys/witness.key
    volumes:
      - witness-b-keys:/keys
    ports:
      - "8501:8500"
    depends_on:
      - aggregator
      - demo-target

  witness-c:
    build: ./witness
    environment:
      WITNESS_ID: witness-c
      PROBE_TARGETS: "upi:http://demo-target/,digilocker:https://www.digilocker.gov.in"
      AGGREGATOR_URL: http://aggregator:8420
      PROBE_INTERVAL_SECONDS: "8"
      KEY_PATH: /keys/witness.key
    volumes:
      - witness-c-keys:/keys
    ports:
      - "8502:8500"
    depends_on:
      - aggregator
      - demo-target

volumes:
  witness-a-keys:
  witness-b-keys:
  witness-c-keys:
  aggregator-db:
  aggregator-keys:
  aggregator-checkpoints:
