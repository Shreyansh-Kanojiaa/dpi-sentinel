services:
  aggregator:
    build: ./backend
    environment:
      DB_URL: sqlite:////app/data/dpi_sentinel.db
      WITNESS_URLS: http://witness-a:8500,http://witness-b:8500,http://witness-c:8500
      MIN_PARTICIPATION_FRACTION: "0.66"
      AGREEMENT_SUPERMAJORITY_FRACTION: "0.6"
      WINDOW_SECONDS: "60"
      QUORUM_TICK_SECONDS: "5"
      OBSERVATION_FRESHNESS_SECONDS: "30"
      # Milestone 3: aggregator identity + tamper-evident log / checkpoints.
      AGGREGATOR_KEY_PATH: /app/keys/aggregator.key
      CHECKPOINT_REPO_PATH: /app/checkpoint-repo
      CHECKPOINT_TICK_SECONDS: "60"
      CHECKPOINT_MAX_ENTRIES: "50"
      CHECKPOINT_MAX_AGE_SECONDS: "3600"
    volumes:
      - aggregator-db:/app/data
      - aggregator-keys:/app/keys          # persist the aggregator's Ed25519 identity across restarts
      - aggregator-checkpoints:/app/checkpoint-repo  # git repo the signed Merkle roots are anchored into
    ports:
      - "8420:8420"

  # All three witnesses point at the same target (UPI) so quorum can be
  # demonstrated meaningfully with only 3 witnesses: stopping one still
  # leaves 2/3 reporting on the SAME rail (participation holds), stopping
  # two drops it to 1/3 (participation fails -> insufficient_data). If a
  # witness only ever watched a rail alone, that rail could never clear
  # MIN_PARTICIPATION_FRACTION against the full registry size — which is
  # correct behavior, not a bug, but it means single-witness-per-rail
  # setups won't demo the way these done-check steps expect.
  witness-a:
    build: ./witness
    environment:
      WITNESS_ID: witness-a
      PROBE_TARGET: https://www.npci.org.in
      AGGREGATOR_URL: http://aggregator:8420
      PROBE_INTERVAL_SECONDS: "8"
      KEY_PATH: /keys/witness.key
    volumes:
      - witness-a-keys:/keys
    ports:
      - "8500:8500"
    depends_on:
      - aggregator

  witness-b:
    build: ./witness
    environment:
      WITNESS_ID: witness-b
      PROBE_TARGET: https://www.npci.org.in
      AGGREGATOR_URL: http://aggregator:8420
      PROBE_INTERVAL_SECONDS: "8"
      KEY_PATH: /keys/witness.key
    volumes:
      - witness-b-keys:/keys
    ports:
      - "8501:8500"
    depends_on:
      - aggregator

  witness-c:
    build: ./witness
    environment:
      WITNESS_ID: witness-c
      PROBE_TARGET: https://www.npci.org.in
      AGGREGATOR_URL: http://aggregator:8420
      PROBE_INTERVAL_SECONDS: "8"
      KEY_PATH: /keys/witness.key
    volumes:
      - witness-c-keys:/keys
    ports:
      - "8502:8500"
    depends_on:
      - aggregator

volumes:
  witness-a-keys:
  witness-b-keys:
  witness-c-keys:
  aggregator-db:
  aggregator-keys:
  aggregator-checkpoints:
