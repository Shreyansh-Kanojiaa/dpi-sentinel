services:
  # Recording aid only, not part of the product: a controllable HTTP target
  # for the pitch video's "degraded" demo beat. Public status-code test
  # services (httpstat.us, httpbin.org) proved unreliable, so witnesses probe
  # this container instead. `docker compose stop demo-target` makes it
  # unreachable -> unhealthy per quorum's agreement check (see quorum.py);
  # `docker compose start demo-target` recovers it. No file edits needed to
  # trigger or resolve the incident.
  demo-target:
    image: nginx:alpine

  aggregator:
    build: ./backend
    environment:
      DB_URL: sqlite:////app/data/dpi_sentinel.db
      WITNESS_URLS: http://witness-a:8500,http://witness-b:8500,http://witness-c:8500,http://witness-d:8500
      # Registry retry/backoff for fetching each witness's /pubkey at aggregator
      # startup (registry.py). build_registry is awaited before main.py's lifespan
      # yield, so the ENTIRE aggregator (every endpoint) is unreachable until every
      # configured witness's fetch resolves, including full retry/backoff for any
      # that are down. Tuned so a genuinely unreachable witness caps that blocking
      # window at ~20-30s (3 attempts x 5s hardcoded per-request timeout + 12s
      # backoff) instead of the ~2.5min the untuned defaults (10/1/15) produced,
      # while still leaving ~12s of real recovery time (the backoff sum, since a
      # not-yet-listening container fails near-instantly rather than timing out)
      # for a witness that's merely slow to boot on a loaded laptop cold start.
      WITNESS_REGISTRY_MAX_ATTEMPTS: "3"
      WITNESS_REGISTRY_BACKOFF_BASE_SECONDS: "4"
      WITNESS_REGISTRY_BACKOFF_CAP_SECONDS: "8"
      MIN_PARTICIPATION_FRACTION: "0.66"
      AGREEMENT_SUPERMAJORITY_FRACTION: "0.6"
      WINDOW_SECONDS: "60"
      QUORUM_TICK_SECONDS: "5"
      OBSERVATION_FRESHNESS_SECONDS: "30"
      # Milestone 3: aggregator identity + tamper-evident log / checkpoints.
      AGGREGATOR_KEY_PATH: /app/keys/aggregator.key
      CHECKPOINT_REPO_PATH: /app/checkpoint-repo
      CHECKPOINT_TICK_SECONDS: "60"
      CHECKPOINT_MAX_ENTRIES: "50"
      CHECKPOINT_MAX_AGE_SECONDS: "3600"
      # Milestone 4: Evidence Certificate issuance rate limit (per IP).
      CERT_RATE_LIMIT_MAX: "5"
      CERT_RATE_LIMIT_WINDOW_SECONDS: "600"
    volumes:
      - aggregator-db:/app/data
      - aggregator-keys:/app/keys          # persist the aggregator's Ed25519 identity across restarts
      - aggregator-checkpoints:/app/checkpoint-repo  # git repo the signed Merkle roots are anchored into
    ports:
      - "8420:8420"

  # Milestone 5: witness-a/b/c cover BOTH rails (UPI and DigiLocker), so
  # quorum is demonstrable on each with 3 witnesses: stopping one still
  # leaves 2/3 reporting (participation holds), stopping two drops it to 1/3
  # (participation fails -> insufficient_data). witness-d below covers ONLY
  # DigiLocker, proving the aggregator now handles partial coverage
  # correctly: quorum.py's participation denominator is per-rail assigned-
  # witness count (WitnessRailAssignment, synced from each witness's
  # declared PROBE_TARGETS at registry time — see registry.py), not a
  # global registered-witness count. So UPI's denominator stays 3
  # (witness-a/b/c) regardless of witness-d existing or being stopped, while
  # DigiLocker's denominator is 4 (witness-a/b/c/d).
  witness-a:
    build: ./witness
    environment:
      WITNESS_ID: witness-a
      PROBE_TARGETS: "upi:http://demo-target/,digilocker:https://www.digilocker.gov.in"
      AGGREGATOR_URL: http://aggregator:8420
      PROBE_INTERVAL_SECONDS: "8"
      KEY_PATH: /keys/witness.key
    volumes:
      - witness-a-keys:/keys
    ports:
      - "8500:8500"
    depends_on:
      - aggregator
      - demo-target

  witness-b:
    build: ./witness
    environment:
      WITNESS_ID: witness-b
      PROBE_TARGETS: "upi:http://demo-target/,digilocker:https://www.digilocker.gov.in"
      AGGREGATOR_URL: http://aggregator:8420
      PROBE_INTERVAL_SECONDS: "8"
      KEY_PATH: /keys/witness.key
    volumes:
      - witness-b-keys:/keys
    ports:
      - "8501:8500"
    depends_on:
      - aggregator
      - demo-target

  witness-c:
    build: ./witness
    environment:
      WITNESS_ID: witness-c
      PROBE_TARGETS: "upi:http://demo-target/,digilocker:https://www.digilocker.gov.in"
      AGGREGATOR_URL: http://aggregator:8420
      PROBE_INTERVAL_SECONDS: "8"
      KEY_PATH: /keys/witness.key
    volumes:
      - witness-c-keys:/keys
    ports:
      - "8502:8500"
    depends_on:
      - aggregator
      - demo-target

  # DigiLocker-only witness — proves partial rail coverage works. Does NOT
  # reduce UPI's or DigiLocker's existing coverage; it's additive on top of
  # witness-a/b/c.
  witness-d:
    build: ./witness
    environment:
      WITNESS_ID: witness-d
      PROBE_TARGETS: "digilocker:https://www.digilocker.gov.in"
      AGGREGATOR_URL: http://aggregator:8420
      PROBE_INTERVAL_SECONDS: "8"
      KEY_PATH: /keys/witness.key
    volumes:
      - witness-d-keys:/keys
    ports:
      - "8503:8500"
    depends_on:
      - aggregator

volumes:
  witness-a-keys:
  witness-b-keys:
  witness-c-keys:
  witness-d-keys:
  aggregator-db:
  aggregator-keys:
  aggregator-checkpoints:
